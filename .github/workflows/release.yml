name: release

on:
    push:
        branches:
            - master

permissions:
    contents: write
    pull-requests: write
    repository-projects: write

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
            NODE_ENV: production
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 10 # 获取最近10个提交

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: 'npm'

            - name: 安装 npm 依赖
              run: |
                  npm i -g eas-cli
                  npm i

            - name: 检查 EXPO_TOKEN 是否存在
              run: |
                  if [ -z "$EXPO_TOKEN" ]; then
                    echo "EXPO_TOKEN 未设置"
                    exit 1
                  else
                    echo "EXPO_TOKEN 已设置"
                  fi

            - name: 启动java 21
              uses: actions/setup-java@v5
              with:
                  distribution: 'temurin'
                  java-version: 21

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v6
              with:
                  cache-overwrite-existing: false
                  cache-cleanup: on-success
                  gradle-home-cache-includes: |
                      caches
                      wrapper
                      build-cache
                  build-scan-publish: true
                  # 自动同意服务条款 (注意这里是 of-use)
                  build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
                  build-scan-terms-of-use-agree: 'yes'

            - name: Cache Android Gradle project # ⭐ 新增
              uses: actions/cache@v6
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                      android/.gradle
                  key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/settings.gradle*') }}
                  restore-keys: |
                      gradle-${{ runner.os }}-

            - name: 安装 Android SDK
              uses: android-actions/setup-android@v4

            - name: 安装 安卓开发工具
              run: |
                  sdkmanager "platforms;android-36" \
                             "build-tools;36.0.0" \
                             "ndk;27.1.12297006" \
                             "cmake;3.22.1"

            # - name: 增加权限  #使用cd android && ./gradlew assembleRelease才加目录权限，否则没有这个目录报错
            #   run: |
            #       chmod +x android/gradlew

            - name: 打包expo应用
              run: |
                  npm run build

            - name: 获取版本号
              id: version
              run: echo "VERSION=$(npm pkg get version | tr -d '\"')" >> $GITHUB_ENV

            # - name: 重命名apk #使用cd android && ./gradlew assembleRelease命令才是这个位置
            #   run: |
            #       # 直接定位到打包输出目录的 apk 并重命名到根目录
            #       mv "android/app/build/outputs/apk/release/app-release.apk" "v${{ env.VERSION }}.apk"

            - name: 重命名apk # 文件在根目录
              run: |
                  # 仅在当前根目录下查找第一个 .apk 文件（不递归子目录）
                  APK_FILE=$(ls -1 *.apk 2>/dev/null | head -n 1)

                  if [ -z "$APK_FILE" ]; then
                    echo "❌ 根目录下未找到任何 APK 文件"
                    ls -la # 打印当前目录文件列表以供排查
                    exit 1
                  fi

                  echo "✅ 找到 APK 文件: $APK_FILE"
                  # 重命名
                  mv "$APK_FILE" "v${{ env.VERSION }}.apk"

            - name: 获取当前时间
              run: |
                  # 使用 date 命令格式化时间
                  export TZ='Asia/Shanghai'
                  current_time=$(date +"%Y-%m-%d %H:%M")
                  echo "FORMATTED_TIME=$current_time" >> $GITHUB_ENV

            - name: 获取最近10个提交信息并存储到环境变量
              id: get-commits
              run: |
                  # 将提交信息收集到环境变量，保留换行符
                  COMMIT_MESSAGES=$(git log -n 10 --pretty=format:"- %s by %an in %h")
                  echo "COMMIT_MESSAGES<<EOF" >> $GITHUB_ENV
                  echo "$COMMIT_MESSAGES" >> $GITHUB_ENV
                  echo "EOF" >> $GITHUB_ENV
                  echo "提交信息已存储到环境变量"

            - name: 发布 Release
              uses: softprops/action-gh-release@v3
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  name: v${{ env.VERSION }}
                  tag_name: v${{ env.VERSION }}
                  body: |
                      # 发布版本 v${{ env.VERSION }}
                      ***时间 ${{ env.FORMATTED_TIME }}***
                      ## What's Changed
                      ${{ env.COMMIT_MESSAGES }}
                  files: 'v${{ env.VERSION }}.apk'
